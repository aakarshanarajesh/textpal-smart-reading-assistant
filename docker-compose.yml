# TextPal - Docker Compose Configuration
version: '3.8'

services:
  textpal:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./static:/app/static
      - ./templates:/app/templates
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    container_name: textpal-app

  # Optional: Add Redis for caching/sessions in future
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   container_name: textpal-redis

volumes:
  uploads:
